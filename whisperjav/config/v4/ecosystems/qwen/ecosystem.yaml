# =============================================================================
# Qwen Ecosystem Configuration
# =============================================================================
# Qwen3-ASR pipeline using the qwen-asr package for automatic speech recognition.
# Supports optional ForcedAligner for word-level timestamps.
# =============================================================================

schemaVersion: v1
kind: Ecosystem

metadata:
  name: qwen
  displayName: "Qwen3-ASR"
  description: |
    ASR using Qwen3-ASR with transformers backend.
    Supports automatic language detection and optional ForcedAligner
    for precise word-level timestamps.
    Optimized for multilingual transcription including Japanese.
  version: "1.0.0"
  tags:
    - qwen
    - transformers
    - multilingual
    - word-timestamps
    - japanese
  author: "WhisperJAV Team"

# Default values inherited by all models in this ecosystem
# All values cross-verified with Qwen3-ASR HF model card (2026-01-29) and
# Qwen3-ASR Technical Report (arXiv:2601.21337).
defaults:
  model.device: auto
  model.dtype: bfloat16          # HF card: bfloat16 used in ALL benchmark evaluations
  model.max_inference_batch_size: 1  # batch_size=1 for max accuracy on 8GB VRAM
  model.max_new_tokens: 8192     # Safe cap for 10-min scenes; dynamic scaler clamps per-clip
  decode.language: null          # null = auto-detect
  timestamps: word
  aligner.enabled: true

# Architectural notes (cross-verified with HF model card 2026-01-29):
# - ForcedAligner supports up to 5 minutes (300s) per chunk in 11 languages
#   incl. Japanese. AAS benchmark: 42.2ms (vs WhisperX 133ms avg).
# - ASR without aligner: up to 20 min (1200s) per chunk.
# - max_new_tokens=8192 safely covers ~10-min Japanese scenes (400 char/min
#   × 2 tokens/char × 10 min = 8000 tokens). For longer audio, scene
#   detection splits into manageable chunks.
# - greedy decoding (temperature=0.01) is HF evaluation standard.

# Implementation provider
provider:
  module: whisperjav.modules.qwen_asr
  class: QwenASR
  install_requires:
    - qwen-asr>=0.1.0
    - torch>=2.0.0
    - transformers>=4.36.0
  optional_requires:
    - flash-attn>=2.0.0

# Compatible auxiliary tools
compatible_tools:
  - auditok-scene-detection
  - silero-scene-detection

# Ecosystem capabilities
supports_gpu: true
supports_batching: true
supports_word_timestamps: true
default_language: null  # auto-detect
